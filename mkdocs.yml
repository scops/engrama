site_name: Engrama
site_description: Graph-based long-term memory framework for AI agents.
site_url: https://scops.github.io/engrama/
repo_url: https://github.com/scops/engrama
repo_name: scops/engrama
edit_uri: edit/main/docs/

theme:
  name: material
  logo: assets/engrama.webp
  language: en
  palette:
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: black
      accent: deep purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
    - content.action.view

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true

extra_css:
  - stylesheets/tokyo-night.css

plugins:
  - search
  - i18n:
      languages:
        - locale: en
          name: English
          default: true
        - locale: es
          name: Español
          nav_translations:
            Home: Inicio
            Architecture: Arquitectura
            Vision: Visión
            Backends: Backends
            Graph Schema: Esquema de Grafo
            Roadmap: Hoja de Ruta
            Guides: Guías
            Contributing: Contribución
            Releasing: Publicación
            Security: Seguridad
            Glossary: Glosario
            Design Decisions (DDRs): Decisiones de Diseño (DDRs)
            Reference: Referencia
            Changelog: Registro de Cambios
            Portable Storage Spec: Espec. de Almacenamiento Portable
            System Prompts: Prompts del Sistema
            Version 0.4: Versión 0.4
            Version 0.5: Versión 0.5
  - mkdocstrings:
      handlers:
        python:
          paths: [.]

nav:
  - Home: index.md
  - Architecture: architecture.md
  - Vision: vision.md
  - Backends: backends.md
  - Graph Schema: graph-schema.md
  - Roadmap: roadmap.md
  - Guides:
      - Contributing: contributing.md
      - Releasing: releasing.md
      - Security: security.md
      - Streamable HTTP: saas/streamable-http.md
      - Glossary: glosario.md
  - Design Decisions (DDRs):
      - DDR-001: ddr-001.md
      - DDR-002: ddr-002.md
      - DDR-003: ddr-003.md
      - DDR-004: ddr-004.md
      - Template: ddr-template.md
  - Reference:
      - Changelog: changelog.md
      - Portable Storage Spec: portable-storage-spec.md
      - System Prompts:
          - Version 0.4: reference/system-prompts/v0.4.md
          - Version 0.5: reference/system-prompts/v0.5.md
