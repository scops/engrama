name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel an in-flight run if a newer commit lands on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# The workflow only reads source; explicit minimum permissions.
permissions:
  contents: read

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Install dev extras
        run: uv sync --extra dev

      - name: ruff format --check
        run: uv run ruff format --check .

      - name: ruff check
        run: uv run ruff check .

  import-smoke:
    name: Base install import smoke (DDR-004 promise)
    runs-on: ubuntu-latest
    # The whole point of DDR-004 is that `pip install engrama` works
    # with NO extras — no Neo4j, no Docker, no Ollama. This job is the
    # gate that catches accidental eager imports of optional deps in
    # the engrama/__init__ chain. If it goes red, someone added a
    # top-level `from neo4j import …` (or similar) somewhere it
    # shouldn't. Matrixed across supported Python versions because the
    # promise is "install on any supported Python".
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Create a clean venv with base deps only
        # `uv pip install .` installs only [project.dependencies] from
        # pyproject.toml — no optional-dependencies, no dependency
        # groups. That is exactly what `pip install engrama` does for
        # an end user.
        run: |
          uv venv .venv-smoke --python ${{ matrix.python-version }}
          uv pip install --python .venv-smoke/bin/python .

      - name: Import engrama with no extras
        run: |
          .venv-smoke/bin/python -c "import engrama; print('ok:', engrama.__version__)"

      - name: Confirm SDK class is reachable
        run: |
          .venv-smoke/bin/python -c "from engrama import Engrama; print('SDK ok:', Engrama.__module__)"

  test-sqlite:
    name: Tests (SQLite, no Docker)
    runs-on: ubuntu-latest
    # The SQLite-only suite is the contract Engrama promises to anyone
    # running `pip install engrama` with no Neo4j and no .env. Keeping
    # it green on every PR is the baseline for portable storage
    # (DDR-004). Matrixed across supported Python versions; the Neo4j
    # integration suite runs separately in `test-neo4j`.
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Install dev + mcp extras
        # mcp is needed by tests/test_adapters.py and the SDK tests
        # that touch the MCP server module; dev gives us pytest +
        # pytest-asyncio. Neo4j extra deliberately omitted so the
        # Neo4j-dependent fixtures skip via NEO4J_PASSWORD being unset.
        run: uv sync --extra dev --extra mcp

      - name: Run pytest (SQLite + backend-agnostic)
        # tests/test_sdk.py explicitly opts into backend="neo4j" — those
        # are integration tests for the Neo4j path and run in the
        # `test-neo4j` job. tests/test_neo4j_store.py and tests that
        # depend on the `neo4j_session` fixture skip cleanly via the
        # conftest skip when NEO4J_PASSWORD is unset.
        run: |
          uv run pytest -q \
            tests/backends \
            tests/contracts \
            tests/test_protocols.py \
            tests/test_composable.py \
            tests/test_openai_compat_embedder.py \
            tests/test_cli.py \
            tests/test_mcp_entrypoint.py

  test-neo4j:
    name: Tests (Neo4j integration)
    runs-on: ubuntu-latest
    # Neo4j integration suite. Runs the test files excluded from
    # `test-sqlite` because they assume a live Neo4j (either via the
    # `neo4j_session` fixture, an EngramaClient(), or backend="neo4j"
    # in the SDK). Pinned to a single Python version — the matrix
    # tradeoff isn't worth 3× the integration cost when neither the
    # backend driver nor our adapter is Python-version-sensitive.
    services:
      neo4j:
        image: neo4j:5.26.4-community
        env:
          NEO4J_AUTH: neo4j/testpassword
          NEO4J_PLUGINS: '["apoc"]'
          NEO4J_dbms_memory_heap_max__size: 1G
          NEO4J_dbms_memory_pagecache_size: 512m
        ports:
          - 7687:7687
          - 7474:7474
        options: >-
          --health-cmd "cypher-shell -u neo4j -p testpassword 'RETURN 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 20
          --health-start-period 30s
    env:
      NEO4J_URI: bolt://localhost:7687
      NEO4J_USERNAME: neo4j
      NEO4J_PASSWORD: testpassword
      GRAPH_BACKEND: neo4j
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: "3.13"
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Install dev + neo4j + mcp extras
        run: uv sync --extra dev --extra neo4j --extra mcp

      - name: Apply Neo4j schema
        # Apply the committed scripts/init-schema.cypher directly via
        # the neo4j driver. We don't go through `engrama init` because
        # that regenerates the schema from a profile, which would
        # diverge from what's in-repo for testing purposes.
        run: |
          uv run python - <<'PY'
          import os
          from pathlib import Path
          from neo4j import GraphDatabase

          driver = GraphDatabase.driver(
              os.environ["NEO4J_URI"],
              auth=(os.environ["NEO4J_USERNAME"], os.environ["NEO4J_PASSWORD"]),
          )
          driver.verify_connectivity()
          text = Path("scripts/init-schema.cypher").read_text(encoding="utf-8")
          stmts = []
          for chunk in text.split(";"):
              lines = [
                  ln for ln in chunk.splitlines()
                  if ln.strip() and not ln.strip().startswith("//")
              ]
              cleaned = "\n".join(lines).strip()
              if cleaned and not cleaned.upper().startswith("SHOW"):
                  stmts.append(cleaned)

          with driver.session() as session:
              for stmt in stmts:
                  try:
                      session.run(stmt)
                  except Exception as exc:
                      print(f"Warning applying statement: {exc}")
          driver.close()
          print(f"Applied {len(stmts)} schema statement(s).")
          PY

      - name: Run pytest (Neo4j integration)
        # Everything excluded from `test-sqlite` (see that job's pytest
        # invocation). Some of these files also contain pure-helper
        # tests that don't need Neo4j; running them here is harmless
        # and keeps the split easy to reason about.
        run: |
          uv run pytest -q \
            tests/test_core.py \
            tests/test_neo4j_store.py \
            tests/test_sdk.py \
            tests/test_temporal.py \
            tests/test_hybrid_search.py \
            tests/test_vector_store.py \
            tests/test_embeddings.py \
            tests/test_adapters.py \
            tests/test_proactive.py \
            tests/test_skills.py \
            tests/test_phase4_skills.py \
            tests/test_obsidian_sync.py

  audit-deps:
    name: Audit dependencies (pip-audit)
    # PR-time vulnerability gate. Only runs when pyproject.toml or
    # uv.lock changes — most PRs don't touch deps, and rerunning the
    # advisory DB for every unrelated PR is wasted CI minutes. Push
    # events on main always run, so a CVE landing in a transitive dep
    # is caught the moment we merge a lockfile bump.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # fetch-depth: 0 is needed so the diff step can see the base
          # of the PR. Without it `git diff base...HEAD` falls back to
          # whatever shallow history `actions/checkout` cloned.
          fetch-depth: 0

      - name: Detect dependency changes
        id: changed
        run: |
          if [[ "$GITHUB_EVENT_NAME" == "pull_request" ]]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            if git diff --quiet "$BASE_SHA" -- pyproject.toml uv.lock; then
              echo "changed=false" >> "$GITHUB_OUTPUT"
              echo "No changes to pyproject.toml or uv.lock — skipping audit."
            else
              echo "changed=true" >> "$GITHUB_OUTPUT"
              echo "Dependency files changed — running audit."
            fi
          else
            # push to main (or any non-PR event) — always run
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up uv
        if: steps.changed.outputs.changed == 'true'
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Export runtime requirements
        if: steps.changed.outputs.changed == 'true'
        run: |
          uv export \
            --no-hashes \
            --no-emit-project \
            --no-dev \
            --format requirements-txt \
            > requirements-audit.txt
          echo "--- requirements-audit.txt ---"
          cat requirements-audit.txt

      - name: Run pip-audit
        if: steps.changed.outputs.changed == 'true'
        # pip-audit exits 1 on any advisory; we don't want that — we
        # want to classify ourselves by severity. So swallow the exit
        # and let the classifier decide.
        run: |
          uv tool install pip-audit
          uv tool run pip-audit \
            -r requirements-audit.txt \
            --format=json \
            > audit.json || true
          echo "--- audit.json ---"
          cat audit.json

      - name: Classify findings + decide
        if: steps.changed.outputs.changed == 'true'
        # Severity policy:
        #   - HIGH/CRITICAL (CVSS >= 7.0, parsed from OSV record)
        #     OR any advisory with an upstream fix available → BLOCKER
        #   - LOW/MEDIUM with no fix yet → warning (commented, doesn't fail)
        #   - No advisories → green
        # The "fix available → block" branch handles vulns where OSV
        # doesn't expose CVSS (common for newer advisories): if there's
        # something we could upgrade to, we should upgrade.
        run: |
          python - <<'PY'
          import json
          import os
          import sys
          import urllib.error
          import urllib.request

          def fetch_cvss(vuln_id: str) -> float | None:
              """Look up the OSV record and return the highest CVSS v3 base score, or None."""
              try:
                  with urllib.request.urlopen(
                      f"https://api.osv.dev/v1/vulns/{vuln_id}", timeout=10
                  ) as resp:
                      data = json.load(resp)
              except (urllib.error.URLError, json.JSONDecodeError, TimeoutError):
                  return None
              scores: list[float] = []
              for entry in data.get("severity", []) or []:
                  if entry.get("type", "").startswith("CVSS_V3"):
                      vector = entry.get("score", "")
                      # CVSS vector strings look like "CVSS:3.1/AV:N/AC:L/.../A:H".
                      # The base score isn't encoded in the vector itself; OSV
                      # records sometimes include it in database_specific or
                      # affected[].database_specific.cvss. We try those next.
              for affected in data.get("affected", []) or []:
                  for spec_key in ("database_specific", "ecosystem_specific"):
                      spec = affected.get(spec_key) or {}
                      score = spec.get("cvss", {}).get("score") if isinstance(spec.get("cvss"), dict) else spec.get("cvss_score")
                      if isinstance(score, (int, float)):
                          scores.append(float(score))
              top = data.get("database_specific", {}) or {}
              if isinstance(top.get("severity"), str):
                  mapping = {"LOW": 3.0, "MODERATE": 5.0, "MEDIUM": 5.0, "HIGH": 8.0, "CRITICAL": 9.5}
                  mapped = mapping.get(top["severity"].upper())
                  if mapped is not None:
                      scores.append(mapped)
              return max(scores) if scores else None

          with open("audit.json") as f:
              data = json.load(f)

          blockers: list[str] = []
          warnings: list[str] = []
          for dep in data.get("dependencies", []):
              name = dep.get("name", "?")
              version = dep.get("version", "?")
              for v in dep.get("vulns", []) or []:
                  vid = v.get("id", "?")
                  fix = v.get("fix_versions") or []
                  desc = (v.get("description") or "").strip().splitlines()[:1]
                  desc_one = desc[0] if desc else ""
                  cvss = fetch_cvss(vid)
                  cvss_label = f"CVSS {cvss:.1f}" if cvss is not None else "CVSS n/a"
                  fix_label = f"fix in {', '.join(fix)}" if fix else "no upstream fix"
                  line = f"- **{name}** {version} — `{vid}` ({cvss_label}, {fix_label}) — {desc_one}"
                  is_high = cvss is not None and cvss >= 7.0
                  if is_high or fix:
                      blockers.append(line)
                  else:
                      warnings.append(line)

          summary_path = os.environ.get("GITHUB_STEP_SUMMARY")
          lines = ["## pip-audit results", ""]
          if blockers:
              lines.append("### :red_circle: Blocking advisories")
              lines.append("These have HIGH/CRITICAL severity or an available upstream fix — please upgrade or pin around them.")
              lines.append("")
              lines.extend(blockers)
              lines.append("")
          if warnings:
              lines.append("### :yellow_circle: Informational advisories")
              lines.append("LOW/MEDIUM severity with no upstream fix yet — not blocking, but track them.")
              lines.append("")
              lines.extend(warnings)
              lines.append("")
          if not blockers and not warnings:
              lines.append(":white_check_mark: No known advisories against runtime dependencies.")
          if summary_path:
              with open(summary_path, "a") as f:
                  f.write("\n".join(lines) + "\n")
          print("\n".join(lines))
          if blockers:
              sys.exit(1)
          PY
