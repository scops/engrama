name: docs
on:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --group dev

      - name: Prepare docs index
        run: |
          cp README.md docs/index.md
          # Adjust links in index.md: replace 'docs/' with './' because it's now at the same level
          sed -i 's/docs\//.\//g' docs/index.md

      - name: Build and deploy
        run: uv run mkdocs gh-deploy --force
